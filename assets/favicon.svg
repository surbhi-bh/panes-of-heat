<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sash window favicon: warm brown frame + heat-tinted panes.
       Chunky proportions so it reads at 16 × 16 in a browser tab. -->
  <rect x="2" y="2" width="60" height="60" rx="4" fill="#3A241B"/>

  <!-- Sill (dark bar at the base) -->
  <rect x="2" y="52" width="60" height="10" fill="#2a1a14"/>

  <!-- Four panes -->
  <rect x="9"  y="9"  width="20" height="20" fill="#f1c21b"/>  <!-- top-left: yellow -->
  <rect x="35" y="9"  width="20" height="20" fill="#e65a25"/>  <!-- top-right: orange -->
  <rect x="9"  y="30" width="20" height="20" fill="#d8d4ea"/>  <!-- bottom-left: lavender -->
  <rect x="35" y="30" width="20" height="20" fill="#6E1712"/>  <!-- bottom-right: deep red -->

  <!-- Cross mullion -->
  <rect x="29" y="6"  width="6"  height="46" fill="#3A241B"/>
  <rect x="6"  y="27" width="52" height="6"  fill="#3A241B"/>
</svg>
